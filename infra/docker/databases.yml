# infra/docker/databases.yml
services:
  postgres:
    image: postgres:18.4-alpine3.23
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: benchmarks
    command: postgres -c max_connections=200
    volumes:
      # postgres 18+ images keep data in a version subdirectory under
      # /var/lib/postgresql; mounting at the old …/data path makes the
      # container refuse to boot on a fresh volume (docker-library/postgres#1259).
      - postgres-data:/var/lib/postgresql
      - ../databases/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d benchmarks"]
      start_period: 10s
      interval: 2s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:8.2.11
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: benchmarks
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      start_period: 10s
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.4.4-alpine3.22
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      interval: 2s
      timeout: 5s
      retries: 10

  cassandra:
    image: cassandra:5.0.8
    restart: unless-stopped
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: bench
      CASSANDRA_BROADCAST_RPC_ADDRESS: 127.0.0.1
      # Pin the gossip seed to the service name (resolves to this node's own IP)
      # so bootstrap never depends on the entrypoint's `hostname --ip-address`
      # scrape. That scrape races the network attach on a cold `up`; when it
      # returns empty the node dies with "The seed provider lists no seeds" and
      # crash-loops. An explicit seed makes both `just db-up` and the benchmark
      # client's own stack cold-boot deterministically.
      CASSANDRA_SEEDS: cassandra
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      start_period: 30s
      interval: 5s
      timeout: 10s
      retries: 20

  cassandra-init:
    image: cassandra:5.0.8
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ../databases/cassandra/init.cql:/init.cql:ro
    entrypoint: ["cqlsh", "cassandra", "-f", "/init.cql"]
    restart: "no"

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  cassandra-data:
